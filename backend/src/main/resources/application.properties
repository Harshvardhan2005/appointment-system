spring.application.name=backend
server.port=${PORT:8082}

# Database Configuration
# Uses individual vars auto-injected by Render when you link a PostgreSQL database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:appointment_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA / Hibernate - explicit dialect prevents startup failure when DB is unreachable
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# CORS
spring.web.cors.allowed-origins=${FRONTEND_URL:*}
