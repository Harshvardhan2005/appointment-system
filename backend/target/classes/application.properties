spring.application.name=backend
server.port=${PORT:8082}

# Database Configuration
# On Render: these are auto-injected when you link a PostgreSQL database
# Locally: falls back to defaults below
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:appointment_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA / Hibernate — NO dialect or driver set: Spring auto-detects from the driver on classpath
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CORS — allow all origins (can restrict later by setting FRONTEND_URL env var)
spring.web.cors.allowed-origins=${FRONTEND_URL:*}
